apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: saegim

resources:
  - deploy/k8s/statefulset.yaml
  - deploy/k8s/service.yaml
  - deploy/k8s/ingress.yaml

# Migration file content changes -> ConfigMap name hash changes -> StatefulSet
# auto-rollout, same pattern as steve-8000/test-agents.
configMapGenerator:
  - name: pocketbase-migrations
    files:
      - pb_migrations/1752624000_saegim_items.js
      - pb_migrations/1752650000_saegim_shares.js
      - pb_migrations/1752700000_saegim_shares_payload.js
      - pb_migrations/1752700001_items_sync_ios_enums.js
      - pb_migrations/1752800000_saegim_shares_subdomain.js
      - pb_migrations/1752900000_saegim_shares_drop_subdomain.js

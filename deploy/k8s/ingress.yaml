apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pocketbase
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: api.saegim.clab.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pocketbase
                port:
                  number: 8090
  tls:
    - hosts:
        - api.saegim.clab.one
      secretName: pocketbase-tls
